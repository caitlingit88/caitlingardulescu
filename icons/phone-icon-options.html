<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phone Icon Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f3f3f3;
      color: #2b2b2d;
      margin: 0;
      padding: 24px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 20px;
      color: #555;
    }
    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 14px;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .icon-circle {
      width: 78px;
      height: 78px;
      border-radius: 50%;
      background: #b8891d;
      display: grid;
      place-items: center;
      line-height: 0;
      flex: 0 0 78px;
    }
    .label {
      background: #16181d;
      color: #fff;
      border-radius: 10px;
      font-size: 36px;
      padding: 8px 16px;
    }
    .meta {
      margin-top: 10px;
      font-size: 14px;
      color: #444;
    }
    svg {
      width: 42px;
      height: 42px;
    }
  </style>
</head>
<body>
  <h1>Pick a Phone Icon</h1>
  <p>Reply with the option letter (`A`-`E`) and I’ll apply it to the floating widget.</p>

  <div class="grid">
    <div class="card">
      <div class="row">
        <div class="icon-circle">
          <!-- A: Heroicons Phone -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 16.92V20a2 2 0 0 1-2.18 2A19.77 19.77 0 0 1 11.19 19.74 19.5 19.5 0 0 1 4.26 12.81 19.77 19.77 0 0 1 2 4.17 2 2 0 0 1 3.92 2h3.09a2 2 0 0 1 2 1.72c.12.9.34 1.78.66 2.62a2 2 0 0 1-.45 2.11L7.91 9.79a16 16 0 0 0 6.3 6.3l1.34-1.31a2 2 0 0 1 2.11-.45c.84.32 1.72.54 2.62.66A2 2 0 0 1 22 16.92Z" fill="white"/>
          </svg>
        </div>
        <div class="label">Phone</div>
      </div>
      <div class="meta"><strong>A</strong> · Heroicons `phone`</div>
    </div>

    <div class="card">
      <div class="row">
        <div class="icon-circle">
          <!-- B: Lucide Phone -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M22 16.92V20a2 2 0 0 1-2.18 2A19.77 19.77 0 0 1 11.19 19.74 19.5 19.5 0 0 1 4.26 12.81 19.77 19.77 0 0 1 2 4.18 2 2 0 0 1 3.92 2h3.1a2 2 0 0 1 2 1.72 12.05 12.05 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8 10a16 16 0 0 0 6 6l1.36-1.27a2 2 0 0 1 2.11-.45 12.05 12.05 0 0 0 2.81.7A2 2 0 0 1 22 16.92Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="label">Phone</div>
      </div>
      <div class="meta"><strong>B</strong> · Lucide `phone` (outline)</div>
    </div>

    <div class="card">
      <div class="row">
        <div class="icon-circle">
          <!-- C: Bootstrap Telephone Fill -->
          <svg viewBox="0 0 16 16" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M3.654 1.328a.678.678 0 0 1 .737-.08l2.522 1.26c.241.12.372.389.32.653l-.37 1.867a.68.68 0 0 0 .195.62l1.535 1.535a.68.68 0 0 0 .62.195l1.867-.37a.678.678 0 0 1 .653.32l1.26 2.522a.678.678 0 0 1-.08.737l-1.08 1.08a1.745 1.745 0 0 1-1.81.402 17.57 17.57 0 0 1-6.146-3.911 17.57 17.57 0 0 1-3.911-6.146 1.745 1.745 0 0 1 .402-1.81l1.08-1.08z"/>
          </svg>
        </div>
        <div class="label">Phone</div>
      </div>
      <div class="meta"><strong>C</strong> · Bootstrap `telephone-fill`</div>
    </div>

    <div class="card">
      <div class="row">
        <div class="icon-circle">
          <!-- D: Material Call -->
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.62 10.79a15.09 15.09 0 0 0 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1C10.07 21 3 13.93 3 5c0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.24.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/>
          </svg>
        </div>
        <div class="label">Phone</div>
      </div>
      <div class="meta"><strong>D</strong> · Material `call`</div>
    </div>

    <div class="card">
      <div class="row">
        <div class="icon-circle">
          <!-- E: Feather Phone Call -->
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M15.05 5A5 5 0 0 1 19 8.95" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M15.05 1A9 9 0 0 1 23 8.95" stroke="white" stroke-width="2" stroke-linecap="round"/>
            <path d="M22 16.92V20a2 2 0 0 1-2.18 2A19.77 19.77 0 0 1 11.19 19.74 19.5 19.5 0 0 1 4.26 12.81 19.77 19.77 0 0 1 2 4.18 2 2 0 0 1 3.92 2h3.1a2 2 0 0 1 2 1.72c.12.9.36 1.77.7 2.59a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.49-1.18a2 2 0 0 1 2.11-.45c.82.34 1.69.58 2.59.7A2 2 0 0 1 22 16.92Z" fill="white"/>
          </svg>
        </div>
        <div class="label">Phone</div>
      </div>
      <div class="meta"><strong>E</strong> · Feather `phone-call`</div>
    </div>
  </div>
</body>
</html>
